[general]
# MXR: 16x16 PE grid, each PE = a 2x2 (4-MAC) cluster = 1024 MACs total.
# SCALE-Sim models 1 MAC per array cell, so the design maps to a 32x32 MAC array
# (16x16 PEs x 4 MACs = 32x32 cells = 1024 MACs).
run_name = mxr_16x16pe_4mac_ws

[architecture_presets]
ArrayHeight:    32
ArrayWidth:     32
IfmapSramSzkB:   1024
FilterSramSzkB:  64
OfmapSramSzkB:   1024
IfmapOffset:    0
FilterOffset:   10000000
OfmapOffset:    20000000
Bandwidth : 10
Dataflow : ws
MemoryBanks:   1
ReadRequestBuffer: 32
WriteRequestBuffer: 32

[layout]
IfmapCustomLayout: False
IfmapSRAMBankBandwidth: 10
IfmapSRAMBankNum: 10
IfmapSRAMBankPort: 2
FilterCustomLayout: False
FilterSRAMBankBandwidth: 10
FilterSRAMBankNum: 10
FilterSRAMBankPort: 2

[sparsity]
SparsitySupport : false
SparseRep : ellpack_block
OptimizedMapping : false
BlockSize : 8
RandomNumberGeneratorSeed : 40

[run_presets]
InterfaceBandwidth: CALC
UseRamulatorTrace: False
# --- Accelergy/CACTI native flow knobs (read by rundir-accelergy, ignored by scalesim) ---
# SRAM/DRAM row size = how many array rows/cols a single memory row feeds; used to
# derive idle-cycle action counts in create_action_count.py. 2 matches the v3 examples.
SRAM_row_size: 2
DRAM_row_size: 2
