# Conda environment for the SCALE-Sim + Accelergy + CACTI MX power demo (the *Python* side).
# You don't run this directly — setup_conda.sh consumes it and also adds Accelergy + CACTI +
# the Jupyter kernel (which aren't on PyPI/conda — they come from git + a C++ build):
#
#   bash rundir-accelergy/setup_conda.sh
#
name: scalesim-mx
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      - numpy==1.26.4        # MUST stay <2  — scalesim's memory model breaks on numpy 2.x
      - pandas
      - numba
      - tqdm
      - absl-py
      - pyyaml
      - ipykernel            # so this env can be a Jupyter kernel
      - jupyterlab
      - matplotlib
